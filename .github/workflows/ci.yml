name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfiles/lambda_get_study_assignment.Dockerfile

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync environment
        run: uv sync --all-groups

      # Tooling excludes third-party agent assets under ai_tools/ via pyproject.toml
      # ([tool.ruff] exclude, [tool.pyright] exclude).

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Pyright
        run: uv run pyright

  lambda-image-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Lambda image (linux/amd64)
        run: |
          docker buildx build --platform linux/amd64 --load \
            -f Dockerfiles/lambda_get_study_assignment.Dockerfile \
            -t get-study-assignment:ci \
            .
